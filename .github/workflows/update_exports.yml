name: Update Export Data

on:
  schedule:
    - cron: "0 6 5 * *"
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pandas

      - name: Run fetch script
        run: |
          python scripts/fetch_exports.py

      - name: Check for changes
        id: git_status
        run: |
          git diff --quiet data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated CSVs
        if: steps.git_status.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/exports_by_country.csv data/exports_summary.csv data/exports_meta.json
          git commit -m "data: update export data [$(date -u '+%Y-%m-%d')]"
          git push

      - name: No changes detected
        if: steps.git_status.outputs.changed != 'true'
        run: echo "Data files unchanged — no commit needed."
